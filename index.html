<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Control de Gastos</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f1a;
    color: #e8e8f0;
    padding-bottom: 80px;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #2a2a3e;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .sync-bar {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
  }
  .sync-bar button {
    background: #2a2a4e;
    color: #e8e8f0;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
  }
  .sync-status { font-size: 11px; color: #8888a8; margin-left: auto; }
  .tabs {
    display: flex;
    overflow-x: auto;
    background: #16213e;
    border-bottom: 1px solid #2a2a3e;
    -webkit-overflow-scrolling: touch;
  }
  .tab {
    padding: 12px 16px;
    font-size: 13px;
    white-space: nowrap;
    color: #8888a8;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: #4ecdc4; border-bottom-color: #4ecdc4; }
  .content { padding: 16px; }
  .card {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid #2a2a3e;
  }
  .card h3 { font-size: 14px; margin-bottom: 10px; color: #a8a8c8; font-weight: 500; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #22223a; }
  .row:last-child { border-bottom: none; }
